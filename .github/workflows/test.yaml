name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:

permissions:
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    runs-on: ubuntu-latest
    name: lint
    if: github.event.action != 'closed' && !startsWith(github.head_ref, 'release-please--')
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test:
    runs-on: ubuntu-latest
    name: test
    if: github.event.action != 'closed' && !startsWith(github.head_ref, 'release-please--')
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: check coverage
        run: |
          go tool cover -func=coverage.out | tail -1

  integration:
    runs-on: ubuntu-latest
    name: integration
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: build binary
        run: go build -o action-summary ./cmd/action-summary

      - name: test string input
        run: |
          INPUT_STRING="This is a test string for summarization." \
          INPUT_SUMMARY_HEADER="String Test" \
          GITHUB_STEP_SUMMARY=$GITHUB_STEP_SUMMARY \
            ./action-summary

      - name: test file input
        run: |
          echo "File content for testing" > /tmp/test-input.txt
          INPUT_PATH=/tmp/test-input.txt \
          INPUT_SUMMARY_HEADER="File Test" \
          GITHUB_STEP_SUMMARY=$GITHUB_STEP_SUMMARY \
            ./action-summary

      - name: test nested json
        run: |
          INPUT_STRING='{"key": "{\"nested\": \"value\"}"}' \
          INPUT_SUMMARY_HEADER="Nested JSON" \
          INPUT_DATA_TYPE=json \
          GITHUB_STEP_SUMMARY=$GITHUB_STEP_SUMMARY \
            ./action-summary

      - name: test oversized input (should warn and exit 0)
        run: |
          INPUT_STRING="hello world" \
          INPUT_MAX_SIZE=5 \
          INPUT_SUMMARY_HEADER="Oversized" \
          GITHUB_STEP_SUMMARY=$GITHUB_STEP_SUMMARY \
            ./action-summary

      - name: test empty input (should fail)
        run: |
          if INPUT_STRING="" INPUT_PATH="" ./action-summary 2>&1; then
            echo "Expected action to fail with empty input"
            exit 1
          fi
          echo "Empty input correctly rejected"

      - name: test both inputs (should fail)
        run: |
          echo "test" > /tmp/both-test.txt
          if INPUT_STRING="test" INPUT_PATH=/tmp/both-test.txt ./action-summary 2>&1; then
            echo "Expected action to fail with both inputs"
            exit 1
          fi
          echo "Both inputs correctly rejected"

  docker:
    runs-on: ubuntu-latest
    name: docker
    needs: [lint, test]
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: log in to ghcr
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: set image tag
        id: tag
        run: echo "value=${{ env.REGISTRY }}/${IMAGE_NAME,,}:pr-${{ github.event.number }}" >> "$GITHUB_OUTPUT"
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}

      - name: build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tag.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  cleanup:
    runs-on: ubuntu-latest
    name: cleanup pr image
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    steps:
      - name: delete pr image
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          TAG: pr-${{ github.event.number }}
        run: |
          VERSION_ID=$(gh api \
            "/orgs/${OWNER}/packages/container/action-summary/versions" \
            --jq ".[] | select(.metadata.container.tags[] == \"${TAG}\") | .id")
          if [ -n "$VERSION_ID" ]; then
            gh api --method DELETE \
              "/orgs/${OWNER}/packages/container/action-summary/versions/${VERSION_ID}"
            echo "Deleted version ${VERSION_ID} (tag: ${TAG})"
          else
            echo "No version found with tag: ${TAG}"
          fi
